<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분양 광고 문의 - 공 간</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .inquiry-page {
            padding-top: 120px;
            padding-bottom: 100px;
            min-height: 100vh;
        }
        .inquiry-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-border);
            border-radius: 24px;
            padding: 50px;
        }
        .inquiry-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .inquiry-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .inquiry-header p {
            color: var(--color-text-muted);
        }
        .inquiry-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .form-group.full {
            grid-column: span 2;
        }
        .inquiry-form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--color-text-main);
        }
        .inquiry-form input, .inquiry-form select, .inquiry-form textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-family: inherit;
            outline: none;
            transition: var(--transition-smooth);
        }
        .inquiry-form input:focus, .inquiry-form textarea:focus {
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-submit-inquiry {
            grid-column: span 2;
            padding: 18px;
            background: var(--color-primary);
            color: #fff;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(168, 126, 85, 0.3);
            transition: var(--transition-smooth);
        }
        .btn-submit-inquiry:hover {
            background: var(--color-primary-light);
            transform: translateY(-2px);
        }
        @media (max-width: 600px) {
            .inquiry-form { grid-template-columns: 1fr; }
            .form-group.full { grid-column: span 1; }
            .btn-submit-inquiry { grid-column: span 1; }
            .inquiry-container { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <!-- Glass Background -->
    <div class="glass-bg-wrapper">
        <div class="glass-orb orb-1"></div>
        <div class="glass-orb orb-2"></div>
        <div class="glass-mesh"></div>
    </div>

    <nav class="navbar scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">공<span>간</span></a>
            <div class="nav-actions">
                <a href="index.html" style="color:#fff; font-weight:600;"><i class="fas fa-arrow-left"></i> 홈으로 돌아가기</a>
            </div>
        </div>
    </nav>

    <main class="inquiry-page">
        <div class="inquiry-container">
            <div class="inquiry-header">
                <h1>분양 광고 문의하기</h1>
                <p>관심 있는 단지에 대해 궁금한 점을 남겨주시면<br>전문 상담사가 영업일 기준 24시간 이내에 답변해 드립니다.</p>
            </div>
            <form class="inquiry-form" id="inquiry-form">
                <div class="form-group">
                    <label>성함</label>
                    <input type="text" placeholder="이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label>연락처</label>
                    <input type="tel" placeholder="010-0000-0000" required>
                </div>
                <div class="form-group">
                    <label>관심 지역</label>
                    <select>
                        <option>서울</option>
                        <option>경기/인천</option>
                        <option>부산/경남</option>
                        <option>대구/경북</option>
                        <option>기타 지역</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>문의 유형</label>
                    <select>
                        <option>단지 정보 문의</option>
                        <option>모델하우스 방문 예약</option>
                        <option>대출 및 자금 상담</option>
                        <option>기타 문의</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>문의 내용</label>
                    <textarea rows="6" placeholder="상세한 문의 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" class="btn-submit-inquiry">문의 등록하기</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('inquiry-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('문의가 접수되었습니다. 곧 연락드리겠습니다!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
